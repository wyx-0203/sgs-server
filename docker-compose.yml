services:
  mysql:
    image: mysql:latest
    ports:
      - 3306:3306
    environment:
      - MYSQL_DATABASE=sgs
      - MYSQL_USER=sgs
      - MYSQL_PASSWORD=123456
      - MYSQL_RANDOM_ROOT_PASSWORD="yes"
    volumes:
      - ./data/mysql:/var/lib/mysql

  nginx:
    build: nginx/
    ports:
      - 80:80

  web:
    build: .
    restart: "always"
    ports:
      - 8080:8080
    depends_on:
      - mysql